<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Добро пожаловать</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: linear-gradient(135deg, #87cefa, #f0e68c);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Press Start 2P', cursive;
    overflow: hidden;
  }

  h1 {
    font-size: 3em;
    background: linear-gradient(90deg, red, orange, yellow, green, blue, violet);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow 5s ease infinite;
    text-align: center;
    margin: 20px;
  }

  @keyframes rainbow {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  .contact {
    font-size: 1em;
    margin: 15px;
    color: white;
    text-shadow: 2px 2px 4px #000;
  }

  .links {
    display: flex;
    gap: 20px;
    margin-top: 30px;
  }

  .links a {
    text-decoration: none;
    font-size: 1em;
    padding: 10px 20px;
    color: white;
    background: linear-gradient(45deg, #ff0000, #ff8c00, #ffd700, #32cd32, #1e90ff, #9400d3);
    background-size: 400% 400%;
    border-radius: 10px;
    transition: transform 0.3s, background-position 0.5s;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .links a:hover {
    transform: scale(1.2);
    animation: rainbow 3s ease infinite;
  }
</style>
</head>
<body>

<h1>Добро пожаловать</h1>
<div class="contact">Связь с администратором: Aleksandr_Suvorov</div>

<div class="links">
  <a href="https://vk.ru/aleksandr14888" target="_blank">ВК</a>
  <a href="https://discord.gg/abc123xyz" target="_blank">Discord</a>
  <a href="https://forum.blackrussia.online/members/aleksandr-suvorov.3647344/" target="_blank">Форум</a>
</div>

</body>
</html>
